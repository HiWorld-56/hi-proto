syntax = "proto3";

import "google/protobuf/empty.proto";

package hi.ai;

message Content {
	string type = 1;
	string content = 2;
}

message SimpleReq {
	repeated hi.ai.Content messages = 1;
}

message GenerateCidResp {
    string cid = 1;
}

message DialogReq {
    string did = 1;
	string cid = 2;
	repeated Content messages = 3;
    string state = 4;
    string custom = 5;
	bool return_plugin_use = 6;
	bool return_training_data = 7;
	bool return_context = 8;
}

message DialogResp {
    string reply = 1;
}

message DialogStreamResp {
    int32 code = 1;
    string type = 2;
	string message = 3;
}

message ClearContextReq {
    string cid = 1;
}

message GetContextReq {
    string cid = 1;
    // string bot = 2;
}

message QA {
    repeated Content q = 3; // User
    string a = 2; // assistant
}

message GetContextResp {
	repeated QA list = 1;
}

message TextToSpeechReq {
    string text = 1;
    string model = 2;
    string style = 3;
}

message TextToSpeechResp {
    string url = 1;
}

message SpeechToTextReq {
    string url = 1;
    string model = 2;
    string lang = 3;
}

message SpeechToTextResp {
    string text = 1;
}

message Function {
	string name = 1;
	string description = 2;
	bool strict = 3;
	bytes parameters  = 4;
}

message Tool {
	string type = 1;
	Function function = 2;
}

message SpeechToSpeechReq {
    string did = 1;
    string cid = 2;
    repeated Content messages = 3;
    string style = 4;
    repeated Tool tools = 5;
    string tool_choice = 6;
    string custom = 7;
    string state = 8;
}

message TextToTextReq {
  string did = 1;
  string cid = 2;
  repeated Content messages = 3;
  repeated Tool tools = 5;
  string tool_choice = 6;
  string custom = 7;
  string state = 8;
}

message ToolCallResultsReq {
	string id = 1;
	repeated ToolCallResult results = 2;
}

message ToolCall {
    string name = 1;
    string arguments = 2;
}

message ToolCallResult {
	string id = 1;
	repeated Content results = 2;
}

// final == true
//   result = text / url
//   tool_calls = null
// final == false
//   result = tool_id
//   tool_calls = tool_calls
message ChatResp {
    bool final = 1;
    string result = 2;
	repeated ToolCall tool_calls = 3;
}

// apiKey鉴权
service Chat {
    rpc Simple (SimpleReq) returns (hi.ai.DialogResp);
	rpc GenerateCid (google.protobuf.Empty) returns (GenerateCidResp);
    rpc Dialog (DialogReq) returns (DialogResp);
    rpc DialogStream (DialogReq) returns (stream DialogStreamResp);
    rpc ClearContext (ClearContextReq) returns (google.protobuf.Empty);
    rpc GetContext (GetContextReq) returns (GetContextResp);
    rpc TextToSpeech (TextToSpeechReq) returns (TextToSpeechResp);
    rpc SpeechToText (SpeechToTextReq) returns (SpeechToTextResp);
    rpc SpeechToSpeech (SpeechToSpeechReq) returns (ChatResp);
    rpc SpeechToSpeech2 (ToolCallResultsReq) returns (ChatResp);
    rpc TextToText (TextToTextReq) returns (ChatResp);
    rpc TextToText2 (ToolCallResultsReq) returns (ChatResp);
}
