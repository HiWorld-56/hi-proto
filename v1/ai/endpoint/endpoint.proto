syntax = "proto3";

import "google/protobuf/empty.proto";

package hi.ai.endpoint;

message EndpointSetReq {
  string endpoint = 1;
}

message EndpointGetResp {
  string endpoint = 1;
}

service PluginEndpoint {
  rpc Set (EndpointSetReq) returns (google.protobuf.Empty);  // Token鉴权
  rpc Get (google.protobuf.Empty) returns (EndpointGetResp); // Token鉴权
}