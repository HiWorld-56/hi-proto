syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";

package hi.ai;

/////////////////////////////// 机器人 ///////////////////////////////
message Prompt {
  string system = 1;
  string user   = 2;
}

message Model {
  string llm       = 1;
  string stt       = 2;
  string tts       = 3;
  string embedding = 4;
}

// 机器人配置
message BotConfig {
  Prompt         prompt            = 1;
  optional float freedom           = 2; // 控制模型输出的随机性，值越大越随机
  Model          model             = 3;
  optional int32 qa_num            = 4; // 上下文组数
  bool           use_mem           = 11; // 启用记忆（启用训练数据）
  bool           use_plugin_search = 12; // 启用搜索插件
  bool           use_plugin_python = 13; // 启用python插件
  bool           use_plugin_draw   = 14; // 启用画图插件
}

message Token {
  int32 output = 1; // 模型生成输出时消耗的token数。
  int32 input  = 2; // 模型输入时消耗的token数
  int32 mem    = 3; // 训练消耗的token数
}

message BotInfo {
  hi.Unit   base       = 1;
  BotConfig config     = 2;
  string    creator    = 4;
  string    note       = 5;
  Token     token      = 6;
  int64     created_at = 7;
  bool      favorited  = 8;
}

message BotConfigResp {
  BotConfig config = 1;
}

message ListLLMResp {
  repeated string models = 1;
}

message ListEmbeddingResp {
  repeated string models = 1;
}

message ListSTTResp {
  repeated string models = 1;
  repeated string langs  = 2;
}

message ListTTSResp {
  repeated string models = 1;
}

message CreateBotReq {
  hi.Unit base = 1;
}

message CreateBotResp {
  hi.Unit   base    = 1;
  BotConfig config  = 2;
  hi.Unit   creator = 3;
}

message EditBotReq {
  hi.Unit   base   = 1;
  BotConfig config = 2;
  string    note   = 3;
}

message ListBotResp {
  int32            total = 1;
  repeated BotInfo infos = 2;
}

message ListBotByDidsReq {
  repeated string dids       = 1;
  hi.Pagination   pagination = 2;
}

message ListBotByDidsResp {
  int32            total = 1;
  repeated BotInfo infos = 2;
}

message DeleteBotReq {
  string did = 1;
}

message FindBotReq {
  string did = 1;
}

message FindBotResp {
  BotInfo info = 1;
}

message FindBotCountReq {
  string did = 1;
}

message FindBotCountResp {
  int32 message_count = 1;
  Token token         = 2;
}

message TransferReq {
  string bot = 1;
  string to  = 2;
}

message UpdatesToDefaultReq {
  repeated string dids = 1;
}

message FavoriteBotReq {
  string did = 1;
    // int32 operation = 2;
  string opt = 2;
}

message ListFavoriteBotReq {
  hi.Pagination pagination = 1;
}

message ListFavoriteBotResp {
  int32            total = 1;
  repeated BotInfo infos = 2;
}

message ListFavoriteBotByDIDsReq {
  repeated string dids       = 1;
  hi.Pagination   pagination = 2;
}

message ListFavoriteBotByDIDsResp {
  int32            total = 1;
  repeated BotInfo infos = 2;
}

// apiKey鉴权
service Bot {
  rpc ListLLM (google.protobuf.Empty) returns (ListLLMResp);
  rpc ListEmbedding (google.protobuf.Empty) returns (ListEmbeddingResp);
  rpc ListSTT (google.protobuf.Empty) returns (ListSTTResp);
  rpc ListTTS (google.protobuf.Empty) returns (ListTTSResp);
  rpc BotConfig (google.protobuf.Empty) returns (BotConfigResp);
  rpc CreateBot (CreateBotReq) returns (CreateBotResp);
  rpc EditBot (EditBotReq) returns (google.protobuf.Empty);
  rpc ListBot (hi.Pagination) returns (ListBotResp);
  rpc ListBotByDids (ListBotByDidsReq) returns (ListBotByDidsResp);
  rpc DeleteBot (DeleteBotReq) returns (google.protobuf.Empty);
  rpc FindBot (FindBotReq) returns (FindBotResp);
  rpc FindBotCount (FindBotCountReq) returns (FindBotCountResp);
  rpc Transfer (TransferReq) returns (google.protobuf.Empty);
  rpc UpdatesToDefault (UpdatesToDefaultReq) returns (google.protobuf.Empty);
  rpc FavoriteBot (FavoriteBotReq) returns (google.protobuf.Empty);
  rpc ListFavoriteBot (ListFavoriteBotReq) returns (ListFavoriteBotResp);
  rpc FavoriteBotListByDIDs (ListFavoriteBotByDIDsReq) returns (ListFavoriteBotByDIDsResp);
}
