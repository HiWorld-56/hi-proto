syntax = "proto3";

import "google/protobuf/empty.proto";

package hi.ai;

message SettingInfo {
    string proxy_url = 1;
    bool enable = 2;
    string endpoint = 3;
}

message SettingEditReq {
    SettingInfo info = 1;
}

message SettingGetResp {
    SettingInfo info = 1;
}

// Token鉴权
service Setting {
    rpc Edit (SettingEditReq) returns (google.protobuf.Empty);
    rpc Get (google.protobuf.Empty) returns (SettingGetResp);
}
