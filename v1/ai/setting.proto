syntax = "proto3";

import "google/protobuf/empty.proto";

package ai;

message SettingInfo {
    string proxy_url = 1;
    string enable = 2;
    string endpoint = 3;
}

message EditSettingsReq {
    SettingInfo info = 1;
}

message GetSettingsResp {
    SettingInfo info = 1;
}

// Token鉴权
service Setting {
    rpc EditSettings (EditSettingsReq) returns (google.protobuf.Empty);
    rpc GetSettings (google.protobuf.Empty) returns (EditSettingsReq);
}