syntax = "proto3";

import "v1/hi.proto";
import "v1/did/login.proto";

package hi.ai;

service Login {
  rpc RefreshToken (hi.did.RefreshTokenReq) returns (hi.Token); // 不鉴权
  rpc GenerateReqId (hi.did.GenerateReqIdReq) returns (hi.ReqID); // 不鉴权
  rpc GetReqStatus (hi.ReqID) returns (hi.did.ReqStatusResp);
}
