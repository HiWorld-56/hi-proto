syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/ai/chat.proto";
import "v1/club/callback/user_callback.proto";

package hi.ai.plugin;

message SearchReq {
  string type    = 1;
  string url     = 2;
  string uuid    = 3;
  string keyword = 4;
}

message SearchResp {
  repeated Content conts = 1;
}

message PythonReq {
  string code        = 1;
  string code_params = 2;
  string uuid        = 3;
}

message PythonResp {
  repeated Content conts = 1;
}

message PythonProjectReq {
  string          code_archive_url = 1;
  string          code_params      = 2;
  string          uuid             = 3;
  repeated string envs             = 4; // 环境变量key=value数组
}

message CleanupPythonProjectReq {
  string code_archive_url = 1;
}

service AiPlugin {
  rpc Search (SearchReq) returns (SearchResp);
  rpc Python (PythonReq) returns (PythonResp);
  rpc PythonProject (PythonProjectReq) returns (PythonResp);
  rpc CleanupPythonProject (CleanupPythonProjectReq) returns (google.protobuf.Empty);
}
