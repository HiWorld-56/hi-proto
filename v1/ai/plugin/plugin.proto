syntax = "proto3";

import "v1/ai/chat.proto";

package hi.ai.plugin;

message SearchReq {
  string type    = 1;
  string url     = 2;
  string uuid    = 3;
  string keyword = 4;
}

message SearchResp {
  repeated Content conts = 1;
}

message PythonReq {
  string          code        = 1;
  string          code_params = 2;
  string          uuid        = 3;
  optional string token       = 4;
  optional string token_user  = 5;
  optional string endpoint    = 6;
}

message PythonResp {
  repeated Content conts = 1;
}

service AiPlugin {
  rpc Search (SearchReq) returns (SearchResp);
  rpc Python (PythonReq) returns (PythonResp);
}
