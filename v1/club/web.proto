syntax = "proto3";

import "google/protobuf/empty.proto";

package club;

message Coin {
    string icon = 1;
    string name = 2;
    string contract = 3;
}

message GetUserAssetsReq {
  string did = 1;
  string coin = 2;
}

message GetUserAssetsResp {
    message Unit {
        Coin coin = 1;
        string address = 2;
        string amount = 3;
        string cny = 4;
        string usd = 5;
    }
    repeated Unit unit = 1;
}

service Web {
    rpc GetUserAssets(GetUserAssetsReq) returns (GetUserAssetsResp);
}