syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";
import "v1/club/mqtt.proto";
import "v1/club/chat_user.proto";

package club;

message GroupInfoParam {
	string group_code = 1;
}
// 查询群信息的响应结构
message GroupBaseInfo {
	string name = 1;
	string avatar = 2;
	string code = 3;
	string type = 4;
	string background = 5;
	int32 display = 6;
	int32 speak_status = 7;
	int64 created_at = 8;
	int64 updated_at = 9;
}

message ChatGroupInfo {
	GroupBaseInfo base_info = 1;
	string user_did = 2;
	string user_type = 3;
	string peer_user_did = 4;
	string peer_user_type = 5;
	string peer_user_name = 6;
	string peer_user_avatar = 7;
	int32 role = 8;
	int32 muted = 9;
}

// 创建群聊
message CreateGroupParam {
	ChatGroupInfo group_info = 1;
	repeated string user_dids = 2;
	repeated string bot_dids = 3;
}

// 创建单聊
message CreateSingleGroupParam {
	ChatGroupInfo group_info = 1;
	string peer_user_did = 2;
	string peer_user_type = 3;
}

// 更新群信息
message UpdateGroupParam {
  string group_code = 1; 
  string name = 2; 
  string avatar = 3;
  string background = 4;
  bool clear_background = 5;
  int32 display = 6; 
  int32 speak_status = 7;
}

// 组聊天消息列表参数
message MessageListParam {
	string uuid = 1;
	int64 last_time = 2;
	string group_code = 3;
	string group_type = 4;
}

message GroupInfoList {
	repeated ChatGroupInfo group_info_list = 1;
}

message GroupMemberParam {
	string group_code = 1;
	hi.Pagination pagination = 2;
}

