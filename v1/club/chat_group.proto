message MemberTotalParam {
	string group_code = 1;
}

message MemberTotal {
	int32 total = 1;
}

message GroupInviteParam {
  string group_code = 1;
  repeated string bot_dids = 3;
  repeated string user_dids = 4;
}

message GroupJoinParam {
	string group_code = 1;
}

message GroupQuitParam {
	string group_code = 1;
}

message GroupRemoveParam {
	string group_code = 1;
  	repeated string bot_dids = 3;
  	repeated string user_dids = 4;
}

message MessageList {
	repeated Packet message_list = 1;
}

message LastUUIDParam {
  string last_uuid = 1;
  string group_code = 2;
  string group_type = 3;
}

message LastUUIDListParam {
	repeated LastUUIDParam last_uuid_list = 1;
}

message SetGroupAdminParam {
  string group_code = 1;
  repeated string peer_user_dids = 2;
  int32 role = 3;
}

message SetUserMutedParam {
  string group_code = 1;
  int32 muted = 2;
}

message GroupCodeParam {
	string group_code = 1;
}

message BotGroupListParam {
	string bot_did = 1;
}

message SetUserHostingParam {
  string group_code = 1;
  string bot_did = 2;
  int32 hosting = 3; // 0: 取消托管，1：启用托管
}

message GroupCode {
	string code = 1;
}

message Q3GroupMemberInfo {
	ChatUserInfo user = 1;
	ChatUserInfo hosted_user = 2;
}

message Q3GroupMemberListResp {
	repeated Q3GroupMemberInfo member_infos = 1;
}

service ChatGroup {
	rpc GroupInfo (GroupInfoParam) returns (ChatGroupInfo); // 群信息
	rpc CreateGroup (CreateGroupParam) returns (ChatGroupInfo); // 创建群
	rpc CreateSingleGroup (CreateSingleGroupParam) returns (ChatGroupInfo); // 创建单聊群
	rpc UpdateGroup (UpdateGroupParam) returns (google.protobuf.Empty); // 更新群
	rpc GroupList (google.protobuf.Empty) returns (GroupInfoList); // 群列表
	rpc GroupMemberList (GroupMemberParam) returns (ChatUserInfoList); // 群成员列表
	rpc Q3GroupMemberList (GroupCode) returns (Q3GroupMemberListResp); // Q3群成员列表
	rpc GroupMemberTotal (MemberTotalParam) returns (MemberTotal); // 群成员总数
	rpc GroupInvite (GroupInviteParam) returns (google.protobuf.Empty); // 群邀请
	rpc GroupJoin (GroupJoinParam) returns (google.protobuf.Empty); // 主动加群
	rpc GroupQuit (GroupQuitParam) returns (google.protobuf.Empty); // 主动退群/解散群
	rpc GroupRemove (GroupRemoveParam) returns (google.protobuf.Empty); // 移出群聊
  	rpc GroupMessageList (MessageListParam) returns (MessageList); // 群消息列表
  	rpc UpdateLastUUID (LastUUIDParam) returns (google.protobuf.Empty); // 更新LastUUID
	rpc CheckLastUUID (LastUUIDListParam) returns (LastUUIDListParam); // 检查LastUUID
	rpc SetGroupAdmin (SetGroupAdminParam) returns (google.protobuf.Empty); // 设置/取消群管理员
	rpc SetUserMuted (SetUserMutedParam) returns (google.protobuf.Empty); // 设置/取消群管理员
	rpc GroupInfoByCode (GroupCodeParam) returns (ChatGroupInfo); // 通过组code查询组信息
	rpc BotGroupList (BotGroupListParam) returns (GroupInfoList); // 机器人组信息列表
	rpc SetUserHosting (SetUserHostingParam) returns (google.protobuf.Empty); // 设置托管
}