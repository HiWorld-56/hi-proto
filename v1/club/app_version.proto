syntax = "proto3";

import "google/protobuf/empty.proto";

package hi.club;

message AppVersionParam {
	string platform = 1;
}

message AppVersionInfo {
  string platform = 1;
  string min_supported_version = 2;
  string latest_version = 3;
  string download_url = 4;
  repeated string changes = 5;
  int64 release_time = 6;
}

// 为了兼容前端，暂时使用 
service AppVersion {
	rpc GetAppLastetVersion (AppVersionParam) returns (AppVersionInfo);
}