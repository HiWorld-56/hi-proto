syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";
import "v1/did/merchant.proto";

package hi.club;

service Merchant {
  rpc List (google.protobuf.Empty) returns (hi.did.MerchantListResp); // 查询用户所在的商户列表
  rpc ListAll (hi.Pagination) returns (hi.did.MerchantListResp); // 查询所有商户列表
}
