syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";
import "v1/ai/train.proto";

package hi.club.ai;

// Token鉴权
service BotTraining {
  rpc TrainingBot (hi.ai.TrainingBotReq) returns (google.protobuf.Empty);                 // 启动训练
  rpc TrainingStatus (hi.ai.TrainingStatusReq) returns (hi.ai.TrainingStatusResp);        // 获取训练状态
  rpc TrainingClear (hi.ai.TrainingClearReq) returns (google.protobuf.Empty);             // 清除训练状态
  rpc UploadFile (hi.ai.UploadFileReq) returns (google.protobuf.Empty);                   // 上传训练文件
  rpc ListBotFile (hi.ai.ListBotFileReq) returns (hi.ai.ListBotFileResp);                 // 获取训练文件列表
  rpc DeleteBotFile (hi.ai.DeleteBotFileReq) returns (google.protobuf.Empty);             // 删除训练文件
  rpc DeleteBotFiles (hi.ai.DeleteBotFilesReq) returns (google.protobuf.Empty);           // 批量删除训练文件
  rpc DeleteBotFilesByDid (hi.ai.DeleteBotFilesByDidReq) returns (google.protobuf.Empty); // 通过机器人did删除训练文件
  rpc GetBotFile (hi.ai.GetBotFileReq) returns (hi.ai.GetBotFileResp);
  rpc UpdateContent (hi.ai.UpdateCotentReq) returns (google.protobuf.Empty);
  rpc CreateContent (hi.ai.CreateCotentReq) returns (hi.ai.CreateCotentResp);
  rpc EditDegest (hi.ai.EditDigestReq) returns (google.protobuf.Empty);
  rpc SetMemModel (hi.ai.SetMemModelReq) returns (google.protobuf.Empty);
  rpc GetMemModel (hi.ai.GetMemModelReq) returns (hi.ai.GetMemModelResp);
}
