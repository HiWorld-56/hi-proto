syntax = "proto3";

import "v1/hi.proto";

package club;

message Packet {
    oneof kind {
        Notice notice = 1;
        Message message = 2;
    }
}

message Notice {
    string uuid = 1;
    string type = 2;
    hi.Unit from = 3;
    int64 timestamp = 4;
    int64 expiration = 5;
    Extra extra = 6;
}

message Prompt {
    string custom = 1;
    string state = 2;
}

/*
Message.type
常规消息: chat
    example
        A >>> Message
            type = chat
            from = A
            ghost = null
草稿消息: draft
    A创建原始消息，需要B修改确认后，作为一条新消息，由B发送出去，发送者显示为A。
    example:
        A >>> Message_1
            type = draft
            from = A
            ghost = B
        B >>> Message_2
            type = chat
            from = A
            ghost = B
代笔消息: chat
    B创建的消息，由B发出，发送者显示为A。
    example:
        B >>> Message
            type = chat
            from = A
            ghost = B
非法消息: invalid
    未通过安全验证的消息
----------------------------------------------------------------------------------------------------
任意聊天中:
    type != chat 时: 一律不显示
    type == chat 时: 发送者显示为 from
*/
message Message {
    string uuid = 1;
    string cid = 2;
    string type = 3;
    hi.Unit from = 4;
    repeated Content content = 5;
    int64 timestamp = 6;
    Extra extra = 7;
    hi.Unit ghost = 8;
    Prompt prompt = 9;
}

message Extra {
    oneof kind {
        hi.Unit unit = 1;
        Mention mention = 2;
        Member member = 3;
        MemberExit member_exit = 4;
        GroupInfo group_info = 5;
    }
}

message Mention {
    hi.Unit group = 1;
    bool all = 2;
    repeated hi.Unit list = 3;
}

message Member {
    hi.Unit group = 1;
    hi.Unit user = 2;
}

message MemberExit {
    Member member = 1;
    string type = 2;
}

message Content {
    string type = 1;
    string content = 2;
}

message GroupInfo {
    hi.Unit base = 1;
    string back_ground = 2;
    bool mute =3;
}
