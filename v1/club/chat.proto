syntax = "proto3";

import "google/protobuf/empty.proto";

package club;

message CID {
	string conversation_id = 1;
}

message SpeechToTextParam {
	string audio_url = 1;
	string Model = 2;
	string Lang = 3;
}

message ChatReply {
	string reply = 1;
}

message MessagesContent {
	string type = 1;
	string content = 2;
}

message ChatParam {
	string conversation_id = 1;
	string bot_did = 2;
	repeated MessagesContent messages = 3;
}

message StreamParam {
	string did = 1;
	string conversation_id = 2;
	repeated MessagesContent messages = 3;
	string state = 4;
	string return_plugin_use = 5;
	string return_training_data = 6;
	string return_context = 7;
}

message GetContextParam {
	string conversation_id = 1;
	string bot_did = 2;
}

message FunctionDefinition {
	string name = 1;
	string description = 2;
	bool strict = 3;
	bytes parameters  = 4;
}

message Tool {
	string type = 1;
	FunctionDefinition function = 2;
}

message TextToTextParam {
  string did = 1;
  string conversation_id = 2;
  repeated MessagesContent messages = 3;
  string voice = 4;
  repeated Tool tools = 5;
  string tool_choice = 6;
  string customer = 7;
  string state = 8;
}

message SpeechToSpeechParam {
  string did = 1;
  string conversation_id = 2;
  repeated MessagesContent messages = 3;
  string voice = 4;
  repeated Tool tools = 5;
  string tool_choice = 6;
  string customer = 7;
  string state = 8;
}

message SpeechToSpeechReply {
	optional string audio_url = 1;
	optional string tool_id = 2;
	repeated ToolCall tool_calls = 3;
}

message FunctionCall {
	string name = 1;
	string arguments = 2;
}

message ToolCall {
	int32 index = 1;
	string id = 2;
	string type = 3;
    FunctionCall function = 4;
}

message TextToTextReply {
	optional string reply = 1;
	optional string tool_id = 2;
	repeated ToolCall tool_calls = 3;
}

message ToolCallsResult {
	string tool_call_id = 1;
	repeated MessagesContent results = 2;
}

message CallToolsParam {
	string tool_id = 1;
	repeated ToolCallsResult tool_results = 2;
}

// message ChatMessageImageURL {
// 	string url = 1;
// 	string detail = 2;
// }

// message ChatMessagePart {
// 	string type = 1;
// 	string text = 2;
// 	ChatMessageImageURL image_url = 3;
// }

message ChatCompletionMessage {
	string role = 1;
	string content = 2;
	string refusal = 3;
	string name = 4;
	FunctionCall function_call = 5;
	repeated ToolCall tool_calls = 6;
	string tool_call_id = 7;
	// repeated ChatMessagePart = multi_content = 8;
}

message ChatCompletionMessageList {
	repeated ChatCompletionMessage message_list = 1;
}

service Chat {
	rpc GenerateCID (google.protobuf.Empty) returns (CID); // 产生CID
	rpc SpeechToText (SpeechToTextParam) returns (ChatReply); // 语音转文本
	rpc Chat (ChatParam) returns (ChatReply); // 非流式对话
	rpc Stream (StreamParam) returns (stream ChatReply); // 流式对话
	rpc ClearContext (CID) returns (google.protobuf.Empty); // 清除上下文
	rpc GetContext (GetContextParam) returns (ChatCompletionMessageList); // 获取上下文
	rpc SpeechToSpeech (SpeechToSpeechParam) returns (SpeechToSpeechReply); // 语音转语音
	rpc SpeechToSpeechCallTools (CallToolsParam) returns (SpeechToSpeechReply); // 语音转语音的补充流程，调用Tool
	rpc TextToText (TextToTextParam) returns (TextToTextReply); // 文本转文本
	rpc TextToTextCallTools (CallToolsParam) returns (TextToTextReply); // 文本转文本的补充流程，调用Tool
}