syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/did/apikey/api_key.proto";

package hi.club.apikey;

// 使用token鉴权
service ApiKey {
  rpc Create (hi.did.apikey.CreateApiKeyReq) returns (hi.did.apikey.CreateApiKeyResp);
  rpc Edit (hi.did.apikey.EditApiKeyReq) returns (hi.did.apikey.EditApiKeyResp);
  rpc List (hi.did.apikey.ListApiKeyReq) returns (hi.did.apikey.ListApiKeyResp);
  rpc Delete (hi.did.apikey.DeleteApiKeyReq) returns (google.protobuf.Empty);
}