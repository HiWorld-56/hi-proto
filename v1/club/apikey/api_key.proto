syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";
import "v1/hi.proto";

package hi.club.apikey;

message ApiKeyInfo {
  string value      = 1;
  string note       = 2;
  int64  created_at = 3;
}

message CreateApiKeyResp {
  ApiKeyInfo info = 1;
}

message EditApiKeyReq {
  string          api_key = 1;
  optional string note    = 2;
}

message EditApiKeyResp {
  ApiKeyInfo info = 1;
}

message ListApiKeyResp {
  int32               total = 1;
  repeated ApiKeyInfo infos = 2;
}

message DeleteApiKeyReq {
  string api_key = 1;
}

// 使用token鉴权
service ApiKey {
  rpc Create (google.protobuf.Empty) returns (CreateApiKeyResp);
  rpc Edit (EditApiKeyReq) returns (EditApiKeyResp);
  rpc List (hi.Pagination) returns (ListApiKeyResp);
  rpc Delete (DeleteApiKeyReq) returns (google.protobuf.Empty);
}