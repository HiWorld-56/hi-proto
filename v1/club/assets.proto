syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/did/base.proto";

package hi.club;

message GetUserAssetsReq {
  string did = 1;
  string coin = 2;
}

message GetUserAssetsResp {
    message Unit {
        hi.did.Coin coin = 1;
        string address = 2;
        float amount = 3;
        float price = 4;
    }
    repeated Unit unit = 1;
    float exchange = 2;
}

service Assets {
    rpc GetUserAssets(GetUserAssetsReq) returns (GetUserAssetsResp);
}
