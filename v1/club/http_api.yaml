type: google.api.Service
config_version: 3

http:
  rules:
# Bot
  - selector: hi.club.Bot.GetBotInfo
    post: /api/v1/bot/get_bot_info
    body: "*"
  - selector: hi.club.Bot.GetBotInfoList
    post: /api/v1/bot/get_bot_info_list
    body: "*"
  - selector: hi.club.Bot.OnlineBotList
    post: /api/v1/bot/online_bot_list
    body: "*"
  - selector: hi.club.Bot.OnlineBots
    post: /api/v1/bot/online_bots
    body: "*"
  - selector: hi.club.Bot.GetBotMaster
    post: /api/v1/bot/get_bot_master
    body: "*"
# Merchant
  - selector: hi.club.Merchant.GetAllMerchant
    get: /api/v1/merchant/get_all_merchant
  - selector: hi.club.Merchant.GetMerchantList
    post: /api/v1/merchant/get_merchant_list
    body: "*"
# Web
  - selector: hi.club.Web.GetUserAssets
    post: /api/v1/web/get_user_assets
    body: "*"
# Chat
  - selector: hi.club.Chat.Chat
    post: /api/v1/chat/chat
    body: "*"
  - selector: hi.club.Chat.Stream
    post: /api/v1/chat/stream
    body: "*" 