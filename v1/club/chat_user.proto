syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";
import "v1/hi.proto";

package club;

message ChatUserBaseInfo {
	string did = 1;
	string name = 2;
	string type = 3;
  	string avatar = 4;
	string background = 5;
	string mqtt_username = 6;
  	string email = 7;
}

message UserInfoParam {
	string did = 1;
}

message ChatUserInfo {
	ChatUserBaseInfo base_info = 1;
	int32 role = 2;
	repeated string permissions = 3;
	google.protobuf.Any attributes = 4;
}

message ChatBotAttribute {
	string creator_did = 1;
	int32 qa_num = 2;
	string system_prompt = 3;
	string user_prompt = 4;
	double freedom = 5;
	string gpt_model = 6;
	string embedding_model = 7;
	string created_at = 8;
	int32 message_count = 9;
	int32 follow_count = 10;
	string mem_model = 11;
	string use_mem = 12;
	string use_about = 13;
	string org_name = 14;
	string org_logo = 15;
	string org_backgroud = 16;
	string about = 17;
	string stt_lang = 18;
	string stt_model = 19;
	string master = 20;
	string note = 21;
	int32 hosting = 22;
	string custom_prompt = 23;
}

message UpdateUserInfoParam {
	string name = 1;
	string avatar = 2;
	string background = 3;
}

message SystemMessageListParam {
	string message_status = 1;
	hi.Pagination pagination = 2;
}

message SystemMessage {
	string uuid = 1;
	SystemMessageExtra extra = 2;
	string type = 3;
	string status = 4;
	int64 timestamp = 5;
	int64 expire_timestamp = 6;
}

message SystemMessageExtra {
	hi.Unit group = 1;
	hi.Unit user = 2; 
}

message SystemMessages {
	bool has_new = 1;
	repeated SystemMessage message_list = 2;
}

message DeleteSystemMessageParam {
	string uuid = 1;
}

message HandleSystemMessageParam {
	string uuid = 1;
	int32 status = 2;
}

message ChatUserInfoList {
	repeated ChatUserInfo user_info_list = 1;
}

message FriendParam {
	string user_did = 1;
	string user_type = 2;
}

message EmailParam {
	string email = 1;
	string password = 2;
}

message SendAboutParam {
	string single_group_code = 1;
	string bot_did = 2;
}

message SendCardParam {
	string single_group_code = 1;
	string peer_user_did = 2;
}

message BotGroupCodeParam {
	string bot_did = 1;
}

message BotGroupCodeList {
	repeated string group_code_list = 1;
}

service ChatUser {
	rpc CurrentUser (google.protobuf.Empty) returns (ChatUserInfo); // 当前用户信息
	rpc UserBasicInfo (UserInfoParam) returns (ChatUserInfo); // 用户信息
	rpc UserInfo (UserInfoParam) returns (ChatUserInfo); // 用户信息
	rpc UpdateUserInfo (UpdateUserInfoParam) returns (google.protobuf.Empty); // 用户信息
	rpc SystemMessageList (SystemMessageListParam) returns (SystemMessages); // 系统消息列表
	rpc DeleteSystemMessage (DeleteSystemMessageParam) returns (google.protobuf.Empty); // 删除系统消息
	rpc DeleteAllSystemMessage (google.protobuf.Empty) returns (google.protobuf.Empty); // 删除所有系统消息
	rpc HandleSystemMessage (HandleSystemMessageParam) returns (google.protobuf.Empty); // 处理系统消息
	rpc CurrentUserFriend (hi.Pagination) returns (ChatUserInfoList); // 当前用户好友
	rpc AddFriend (FriendParam) returns (google.protobuf.Empty); // 添加好友
	rpc DeleteFriend (FriendParam) returns (google.protobuf.Empty); // 删除好友
	rpc RegisterEmail (EmailParam) returns (google.protobuf.Empty); // 注册邮箱
	rpc EditEmail (EmailParam) returns (google.protobuf.Empty); // 编辑邮箱
	rpc SendAbout (SendAboutParam) returns (google.protobuf.Empty);
	rpc SendCard (SendCardParam) returns (google.protobuf.Empty);
	rpc BotGroupCode (BotGroupCodeParam) returns (BotGroupCodeList); // 机器人所在群的群Code
}