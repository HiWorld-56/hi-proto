syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";
import "v1/ai/bot.proto";

package hi.club;

message BindMasterReq {
    string master = 1;
	string bot = 2;
}

message UnbindMasterReq {
    string master = 1;
	string bot = 2;
}

message BindStatusReq {
	string bot = 1;
}

message BindStatusResp {
	string master = 1;
}


message ListAllOnlineBotResp {
    int32 total = 1;
    repeated hi.ai.BotInfo list = 2;
}

message GetBotMasterReq {
    string bot = 1;
}

message GetBotMasterResp {
    hi.Unit master = 1;
}

message ListOnlineBotResp {
    repeated hi.ai.BotInfo list = 1;
}

service Bot {
    rpc ListLLM (google.protobuf.Empty) returns (hi.ai.ListLLMResp);
    rpc ListEmbedding (google.protobuf.Empty) returns (hi.ai.ListEmbeddingResp);
    rpc ListSTT (google.protobuf.Empty) returns (hi.ai.ListSTTResp);
    rpc ListTTS (google.protobuf.Empty) returns (hi.ai.ListTTSResp);
    rpc BotConfig (google.protobuf.Empty) returns (hi.ai.BotConfigResp);
    rpc CreateBot (hi.ai.CreateBotReq) returns (hi.ai.CreateBotResp);
    rpc EditBot (hi.ai.EditBotReq) returns (google.protobuf.Empty);
    rpc ListBot (hi.Pagination) returns (hi.ai.ListBotResp);
    rpc ListBotByDids (hi.ai.ListBotByDidsReq) returns (hi.ai.ListBotByDidsResp);
    rpc DeleteBot (hi.ai.DeleteBotReq) returns (google.protobuf.Empty);
    rpc FindBot (hi.ai.FindBotReq) returns (hi.ai.FindBotResp);
    rpc FindBotCount (hi.ai.FindBotCountReq) returns (hi.ai.FindBotCountResp);
    rpc Transfer (hi.ai.TransferReq) returns (google.protobuf.Empty);
    rpc UpdatesToDefault (hi.ai.UpdatesToDefaultReq) returns (google.protobuf.Empty);
    rpc FavoriteBot (hi.ai.FavoriteBotReq) returns (google.protobuf.Empty);
    rpc ListFavoriteBot (hi.ai.ListFavoriteBotReq) returns (hi.ai.ListFavoriteBotResp);
    rpc FavoriteBotListByDIDs (hi.ai.ListFavoriteBotByDIDsReq) returns (hi.ai.ListFavoriteBotByDIDsResp);

    rpc BindMaster (BindMasterReq) returns (google.protobuf.Empty); // 绑定机器人
	rpc UnbindMaster (UnbindMasterReq) returns (google.protobuf.Empty); // 解绑机器人
	rpc BindStatus (BindStatusReq) returns (BindStatusResp); // 机器人绑定状态
	rpc ListAllOnlineBot (hi.Pagination) returns (ListAllOnlineBotResp); // 在线机器人列表
	rpc ListOnlineBot (hi.DID) returns (ListOnlineBotResp); // 用户的在线机器人
	rpc GetBotMaster (GetBotMasterReq) returns (GetBotMasterResp); // 机器人主人
}
