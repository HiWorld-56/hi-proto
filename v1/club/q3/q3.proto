syntax = "proto3";

import "google/protobuf/empty.proto";

import "v1/hi.proto";

package hi.club.q3;

message User {
	hi.Unit user = 1;
	hi.Unit bot = 2;
	string custom = 3;
	bool creator = 4;
	bool topic = 5;
	bool ready = 6;
}

message GroupCreateReq {
	string name = 1;
}

message GroupCreateResp {
	string id = 1;
}

message GroupEventReq {
	string id = 2;
	User user = 3;
    string to = 4;
}

message GroupReadyReq {
	string id = 1;
  	User user = 2;
}

message GroupReadyResp {
	string id = 1;
  	bool ready = 2;
	hi.Unit group = 3;
}

message HostingReq {
  string group = 1;
  bool hosting = 2;
}

message GetInfosReq {
	repeated string groups = 1;
}

message Info {
	message Unit {
		hi.Unit ghost = 1;
		hi.Unit bot = 2;
	}

    hi.Unit group = 1;
	repeated Unit list = 2;
}

message GetInfosResp {
	repeated Info list = 1;
}

service Group {
	rpc GetInfos (GetInfosReq) returns (GetInfosResp); // 
	rpc Create (GroupCreateReq) returns (GroupCreateResp); // 创建群
	rpc Event (GroupEventReq) returns (google.protobuf.Empty); // 群事件
	rpc Ready (GroupReadyReq) returns (GroupReadyResp); // 群就绪
	rpc Hosting (HostingReq) returns (google.protobuf.Empty); // 设置托管
}
