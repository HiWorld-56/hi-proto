syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";

package hi.did;

message Coin {
  string icon     = 1;
  string name     = 2;
  string category = 3; // public-公共币种, custom-自定义币种
}

message ListCoinsResp {
  repeated Coin list = 1;
}

message LastetVersionReq {
  string platform = 1; // android / ios / ...
}

message LastetVersionResp {
  string          min_supported_version = 1;
  string          latest_version        = 2;
  string          download_url          = 3;
  repeated string changes               = 4;
  int64           release_time          = 5;
}

message ListSuperAdminUsersResp {
  repeated string list = 1;
}

service Base {
  rpc ListCoins (google.protobuf.Empty) returns (ListCoinsResp); // 不鉴权
  rpc TotalUsers (google.protobuf.Empty) returns (hi.Number); // 不鉴权
  rpc LastetVersion (LastetVersionReq) returns (LastetVersionResp); // 不鉴权
  rpc ListSuperAdminUsers (google.protobuf.Empty) returns (ListSuperAdminUsersResp); // 不鉴权
}

service Assist {
  rpc VerifySignature (hi.Web3Data) returns (hi.DID); // Web3鉴权
}
