syntax = "proto3";

import "v1/hi.proto";
import "v1/did/base.proto";

package hi.did;

message Transaction {
  string      hash   = 1;
  string      amount = 2;
  hi.did.Coin coin   = 3;
  hi.Unit     from   = 4;
  hi.Unit     to     = 5;
}

message InputOutputs {
  string value   = 1;
  string address = 2;
}

message TransactionExtend {
  Transaction           trans   = 1;
  repeated InputOutputs inputs  = 2;
  repeated InputOutputs outputs = 3;
}

message ListTransactionsReq {
  string        coin       = 1;
  string        address    = 2;
  hi.Pagination pagination = 4;
}

message ListTransactionsResp {
  message Unit {
    TransactionExtend trans     = 1;
    int32             direction = 5;
    int32             status    = 6;
    int64             timestamp = 7;
  }
  repeated Unit list   = 1;
  bool          is_end = 3;
}

message GetTransactionDetailReq {
  TransactionExtend trans            = 1;
  string            verify_hash_dump = 6;
  string            verify_tran      = 7;
}

message GetTransactionDetailResp {
  TransactionExtend trans            = 1;
  string            timestamp        = 2;
  int64             confirmed_blocks = 3;
  string            status           = 4;
  string            error            = 5;
}

service Transfer {
  rpc ListTransactions (ListTransactionsReq) returns (ListTransactionsResp); // 不鉴权
  rpc GetTransactionDetail (GetTransactionDetailReq) returns (GetTransactionDetailResp); // 不鉴权
}
