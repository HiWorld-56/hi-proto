syntax = "proto3";

import "v1/did/base.proto";

package hi.did;

message GetPriceReq {
    string coin = 1;
}

message GetPriceResp {
    message Unit {
        float price = 1;
        Coin coin = 2;
    }
    repeated Unit list = 1;
    float exchange = 2;
}

service Price {
    rpc GetPrice (GetPriceReq) returns (GetPriceResp); // 不鉴权
}
