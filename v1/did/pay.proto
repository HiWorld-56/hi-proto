syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";

package did;

message Order {
    string src = 1; // qr, app
    string id = 2; // req_id
    string did = 3;
    string hash = 4;
}

service Pay {
    rpc GenerateReq (hi.Node) returns (hi.ReqID); // 不鉴权
    rpc Notify(hi.Web3Data) returns (google.protobuf.Empty); // Order // Web3鉴权
}
