syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/protobuf/any.proto";
import "v1/hi.proto";
import "v1/did/base.proto";

package did;

message MerchantInfo {
    hi.Unit master = 2;
    hi.Unit server = 3;
    string  name = 4;
    repeated Coin public_coins = 5; // 公共币种
    repeated Coin custom_tokens = 6; // 自定义币种
    string  endpoint = 7;
    string  scheme = 8;
    string  extend_token = 9;
    int64   created_at = 10;
}

message MerchantGetResp {
    MerchantInfo info = 1;
}

message MerchantSetReq {
    string  server = 1;
    string  name = 2;
    string logo = 3;
    repeated string coins = 4;
    string  endpoint = 5;
    string  scheme = 6;
    string comment = 7;
}

message MerchantListResp {
	repeated MerchantInfo list = 1;
}

message UserProfileGetResp {
    hi.Unit profile = 1;
}

message UserProfileSetReq {
    string did = 1;
    string name = 2;
    string avatar = 3;
}

service Merchant {
    rpc Get (google.protobuf.Empty) returns (MerchantGetResp); // Token鉴权
    rpc Set (MerchantSetReq) returns (google.protobuf.Empty); // Token鉴权
    rpc List (hi.DID) returns (MerchantListResp);  // Token鉴权
    rpc GetUserProfile (hi.DID) returns (UserProfileGetResp); // Token鉴权
    rpc SetUserProfile (UserProfileSetReq) returns (google.protobuf.Empty); // Token鉴权
}

message MerchantNotifyReq {
	string did = 1;
	string nonce = 2;
}

message OrderEventResp {
	string event = 1;
    string payload = 2;
}

service SSE {
    rpc OrderEvents(hi.DID) returns (stream OrderEventResp);  // 不鉴权
    rpc Notify (MerchantNotifyReq) returns (google.protobuf.Empty); // 不鉴权
}
