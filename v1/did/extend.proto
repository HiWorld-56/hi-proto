syntax = "proto3";

import "google/protobuf/empty.proto";
import "google/api/annotations.proto";

package did;

message UserExtendSettingResp {
    string token = 2;
    string table = 3;
}

service UserExtendSetting {
    rpc Update (google.protobuf.Empty) returns (UserExtendSettingResp) {
        option (google.api.http) = {
            post: "/api/v1/user_extend_setting/update"
        };
    } // Token鉴权
    rpc Get (google.protobuf.Empty) returns (UserExtendSettingResp) {
        option (google.api.http) = {
            get: "/api/v1/user_extend_setting/get"
        };
    }  // Token鉴权
}

message UserExtendInfo {
    string logo   = 2;
    int32 level   = 3;
    string card   = 4;
    string extend = 5;
}

message UserExtendUpdateReq {
    message Unit {
        string did = 1;
        UserExtendInfo info = 2;
    }
    repeated Unit unit = 2;
}

message UserExtendListReq {
    repeated string list = 1; // did list
}

message UserExtendListResp {
    message Unit {
        string did = 1;
        UserExtendInfo info = 2;
    }
    repeated Unit unit = 2;
}

message UserExtendDeleteReq {
    repeated string list = 1;
}

service UserExtend {
    rpc Update (UserExtendUpdateReq) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            post: "/api/v1/user_extend/update"
            body: "*"
        };
    } // Extend-Token鉴权
    rpc List (UserExtendListReq) returns (UserExtendListResp) {
        option (google.api.http) = {
            post: "/api/v1/user_extend/list"
            body: "*"
        };
    } // Extend-Token鉴权
    rpc Delete (UserExtendDeleteReq) returns (google.protobuf.Empty) {
        option (google.api.http) = {
            post: "/api/v1/user_extend/delete"
            body: "*"
        };
    } // Extend-Token鉴权
}
