syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";

package hi.did;

message UserExtendSettingResp {
  string token = 1;
  string table = 2;
}

service UserExtendSetting {
  rpc Update (google.protobuf.Empty) returns (UserExtendSettingResp); // Token鉴权
  rpc Get (google.protobuf.Empty) returns (UserExtendSettingResp); // Token鉴权
}

message Button {
  string bg_color = 1; // 背景色
  string title    = 2; // 按钮文字
  string type     = 3; // url类型: url, scheme
  string url      = 4; // 
}

message Card {
  string title = 1; // 标题
  string text  = 2; // 文本
  string logo  = 3; // logo
  Button left  = 4; // 左按钮
  Button right = 5; // 右按钮
}

message UserExtendInfo {
  string         logo   = 1;
  optional int32 level  = 2;
  string         card   = 3;
  string         extend = 4;
  string         note   = 5;
}

message UserExtendUpdateReq {
  message Unit {
    string         did  = 1;
    UserExtendInfo info = 2;
  }
  repeated Unit unit = 1;
}

message UserExtendListReq {
  string        user       = 1; // 用户did
  hi.Pagination pagination = 2;
}

message UserExtendUnit {
  hi.Unit        user = 1;
  UserExtendInfo info = 2;
}

message UserExtendListResp {
  message Unit {
    hi.Unit        user = 1;
    UserExtendInfo info = 2;
  }
  int32         total = 1;
  repeated Unit unit  = 2;
}

message UserExtendDeleteReq {
  repeated string list = 1;
}

message ListByMerchantDidReq {
  string merchant = 1; // 商户did
}

message ListByMerchantDidResp {
  message Unit {
    hi.Unit        user = 1;
    UserExtendInfo info = 2;
  }
  repeated Unit unit  = 1;
}

message UserExtendGetReq {
  string merchant = 1;
  string user     = 2;
}

message UserExtendGetResp {
  UserExtendUnit unit = 1;
}


service UserExtend {
  rpc Update (UserExtendUpdateReq) returns (google.protobuf.Empty); // Extend-Token鉴权
  rpc List (UserExtendListReq) returns (UserExtendListResp); // Extend-Token鉴权
  rpc Delete (UserExtendDeleteReq) returns (google.protobuf.Empty); // Extend-Token鉴权
  rpc ListByMerchantDid (ListByMerchantDidReq) returns (ListByMerchantDidResp); // Extend-Token鉴权
  rpc Get (UserExtendGetReq) returns (UserExtendGetResp); // Extend-Token鉴权
}
