syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";
import "v1/did/base.proto";

package hi.did;

message AgentInfo {
  string uuid             = 1;  // UUID
  string category         = 2;  // 分类：banner; agent
  string sub_category     = 3;  // 二级分类，agent分类：curated-精选智能体; ordinary-普通智能体
  string name             = 4;  // 名字
  string price            = 5;  // 价格
  did.Coin coin           = 6;  // 价格的币种
  string logo             = 7;  // LOGO
  string url              = 8;  // URL
  string description      = 9;  // 描述
  optional bool external  = 10; // 是否内置浏览器打开
  optional bool nav       = 11; // 是否在导航栏展示
  optional bool promotion = 12; // 是否推广
}

message AgentListReq {
  string category          = 1; // 分类：banner; agent
  hi.Pagination pagination = 2;
}

message AgentListResp {
  int32 total             = 1;
  repeated AgentInfo list = 2;
}

message AgentListByClassReq {
  string user = 1; // 商户DID
}

message AgentListByClassResp {
  repeated AgentInfo banner   = 1; // banner
  repeated AgentInfo curated  = 2; // 精选智能体
  repeated AgentInfo ordinary = 3; // 普通智能体
}

message AgentUpdateOrderReq {
  message Unit {
    string uuid  = 1;
    int32  order = 2;
  }
  string category    = 1; // 分类, banner; agent
  repeated Unit list = 2;
}

message AgentDeleteReq {
  string uuid = 1;
}

service Agent {
  rpc List (AgentListReq) returns (AgentListResp); // Token鉴权
  rpc ListByClass (AgentListByClassReq) returns (AgentListByClassResp); // ExtendToken鉴权
  rpc Create (AgentInfo) returns (google.protobuf.Empty);  // Token鉴权
  rpc Edit (AgentInfo) returns (google.protobuf.Empty); // Token鉴权
  rpc Delete (AgentDeleteReq) returns (google.protobuf.Empty); // Token鉴权
  rpc UpdateOrder (AgentUpdateOrderReq) returns (google.protobuf.Empty); // Token鉴权
}



