syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";

package hi;

message LoginData {
    string src = 1; // qr, app
    string id = 2;
    string did = 3;
}

// 三方app/web登录回调
service LoginCallback {
    rpc Login(hi.Web3Data) returns (google.protobuf.Empty); // LoginData // Web3鉴权
}