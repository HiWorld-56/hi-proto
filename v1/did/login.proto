syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";

package hi.did;

message RefreshTokenReq {
  hi.Node node          = 1;
  string  did           = 2;
  string  refresh_token = 3;
}

// hidid web/app/pc登录
message LoginReq {
  hi.DID   did    = 1;
  hi.Node  node   = 2;
  hi.ReqID req_id = 3;
}

message LoginResp {
  hi.Unit  user  = 1;
  hi.Token token = 2;
  hi.Mqtt  mqtt  = 3;
}

message GenerateReqIdReq {
  string  did  = 1;
  hi.Node node = 2;
}

message ReqStatusResp {
  hi.Unit  base   = 1;
  string   status = 2;
  hi.Token token  = 3;
  hi.Mqtt  mqtt   = 4;
}

service Login {
  rpc RefreshToken (RefreshTokenReq) returns (hi.Token); // 不鉴权
  rpc Verify (hi.Web3Data) returns (LoginResp); // LoginReq // Web3鉴权
  rpc ThirdPartyVerify (hi.Web3Data) returns (LoginResp); // 三方登录
  rpc GenerateReqId (GenerateReqIdReq) returns (hi.ReqID); // 不鉴权
  rpc GetReqStatus (hi.ReqID) returns (ReqStatusResp); // 不鉴权
  rpc Notify (hi.Web3Data) returns (google.protobuf.Empty); // LoginReq // Web3鉴权
  rpc Logout (google.protobuf.Empty) returns (google.protobuf.Empty); // Token鉴权
}
