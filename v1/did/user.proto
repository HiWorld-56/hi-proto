syntax = "proto3";

import "google/protobuf/empty.proto";
import "v1/hi.proto";

package hi.did;

message UserListReq {
  hi.Pagination pagination = 1;
}

message UserListResp {
  int32            total = 1;
  repeated hi.Unit list  = 2;
}

message UserTotalResp {
  int32 total = 1;
}

service User {
  rpc Edit (hi.Unit) returns (google.protobuf.Empty);  // Token鉴权
  rpc Query (google.protobuf.Empty) returns (hi.Unit); // Token鉴权
  rpc Total (google.protobuf.Empty) returns (UserTotalResp); // 不鉴权
}
