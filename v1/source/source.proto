syntax = "proto3";

import "buf/validate/validate.proto";

package hi.source;

message UploadReq {
  string type    = 1 [(buf.validate.field).string.min_len = 1]; // image/video/audio/file
  string name    = 2 [(buf.validate.field).string.min_len = 1]; // 文件名
  bytes  content = 3 [(buf.validate.field).bytes.min_len = 1]; // 文件内容

  string thumb_url = 4 [(buf.validate.field).required = true];
}

message UploadResp {
  string          url       = 1;
  optional string thumb_url = 2;
}

message DownloadReq {
  string url = 1 [(buf.validate.field).string.min_len = 1];
}

message DownloadResp {
  bytes content = 1;
}

service File {
  rpc Upload(UploadReq) returns (UploadResp);
  rpc Download(DownloadReq) returns (DownloadResp);
}