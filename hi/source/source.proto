syntax = "proto3";

package hi.source;

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/source";

import "buf/validate/validate.proto";

message UploadReq {
  string type    = 1 [(buf.validate.field).string.pattern="^\\S+$"]; // image/video/audio/file/avatar/code
  string name    = 2 [(buf.validate.field).string.pattern="^\\S+$"]; // 文件名
  bytes  content = 3 [(buf.validate.field).bytes.min_len = 1]; // 文件内容
}

message UploadResp {
  string          url       = 1;
  optional string thumb_url = 2;
}

message DownloadReq {
  string url = 1 [(buf.validate.field).string = {pattern: "^\\S+$"}];
}

message DownloadResp {
  bytes content = 1;
}

message UploadStreamReq {
  oneof data {
    UploadMeta meta  = 1; // 文件元数据，第一个请求包
    bytes      chunk = 2; // 文件内容分片，后续请求包
  }
}

message UploadMeta {
  string type = 1 [(buf.validate.field).string.pattern="^\\S+$"]; // image/video/audio/file/avatar/code
  string name = 2 [(buf.validate.field).string.pattern="^\\S+$"]; // 文件名
  int64  size = 3 [(buf.validate.field).int64 = { gt: 0 }]; // 文件大小, 单位：字节
}

message DownloadStreamResp {
  bytes chunk  = 1; // 文件内容分片
  int64 sent   = 2; // 已发送字节数（累计）, 单位：字节
  int64 total  = 3; // 文件总大小, 单位：字节
  int64 offset = 4; // 当前块在文件中的起始字节位置
}

message DownloadStreamReq {
  string url    = 1 [(buf.validate.field).string = {pattern: "^\\S+$"}]; // 文件URL
  int64  offset = 2 [(buf.validate.field).int64 = {gte: 0}]; // 起始偏移量（字节），0表示从头开始，支持断点续传
  int64  limit  = 3 [(buf.validate.field).int64 = {gte: 0}]; // 限制下载大小（字节），0表示下载全部
}

service File {
  rpc Upload(UploadReq) returns (UploadResp); // 文件上传
  rpc Download(DownloadReq) returns (DownloadResp); // 文件下载
  rpc UploadStream(stream UploadStreamReq) returns (UploadResp); // 流式上传
  rpc DownloadStream(DownloadStreamReq) returns (stream DownloadStreamResp); // 流式下载
}
