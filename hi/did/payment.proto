syntax = "proto3";

package hi.did;

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/did";

import "google/protobuf/empty.proto";
import "hi/common.proto";

message Order {
  string id   = 1; // req_id
  string did  = 2;
  string hash = 3;
}

service Pay {
  rpc GenerateReq (hi.ClientInfo) returns (hi.RequestId); // 不鉴权
  rpc Notify (hi.SignedData) returns (google.protobuf.Empty); // Order // Web3鉴权
}
