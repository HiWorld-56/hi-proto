syntax = "proto3";

package hi.did;

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/did";

import "hi/did/base.proto";

message GetPriceReq {
  string coin = 1;
}

message GetPriceResp {
  message Unit {
    string price = 1;
    Coin   coin  = 2;
  }
  repeated Unit list     = 1;
  string        exchange = 2;
}

service Price {
  rpc GetPrice (GetPriceReq) returns (GetPriceResp); // 不鉴权
}
