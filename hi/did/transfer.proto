syntax = "proto3";

package hi.did;

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/did";

import "hi/common.proto";
import "hi/did/base.proto";

message Transaction {
  string      hash   = 1;
  string      amount = 2;
  Coin        coin   = 3;
  hi.Entity   from   = 4;
  hi.Entity   to     = 5;
  string      remark = 6;
}

message InputOutputs {
  string value   = 1;
  string address = 2;
}

message TransactionExtend {
  Transaction           trans   = 1;
  repeated InputOutputs inputs  = 2;
  repeated InputOutputs outputs = 3;
}

message ListTransactionsReq {
  string        coin       = 1;
  string        address    = 2;
  hi.Pagination pagination = 3;
}

message ListTransactionsResp {
  message Unit {
    TransactionExtend trans     = 1;
    int32             direction = 2;
    int32             status    = 3;
    int64             timestamp = 4;
  }
  repeated Unit list   = 1;
  bool          is_end = 2;
}

message GetTransactionDetailReq {
  TransactionExtend trans            = 1;
  string            verify_hash_dump = 2;
  string            verify_tran      = 3;
}

message GetTransactionDetailResp {
  TransactionExtend trans            = 1;
  string            timestamp        = 2;
  int64             confirmed_blocks = 3;
  string            status           = 4;
  string            error            = 5;
}

service Transfer {
  rpc ListTransactions (ListTransactionsReq) returns (ListTransactionsResp); // 不鉴权
  rpc GetTransactionDetail (GetTransactionDetailReq) returns (GetTransactionDetailResp); // 不鉴权
}
