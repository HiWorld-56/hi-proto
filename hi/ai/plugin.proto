syntax = "proto3";

package hi.ai;

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/ai";

import "google/protobuf/empty.proto";
import "google/protobuf/struct.proto";
import "hi/common.proto";
import "hi/ai/chat.proto";

message DrawConfigResp {
  repeated string draw_style           = 1;
  string          draw_style_default   = 2;
  repeated string draw_quality         = 3;
  string          draw_quality_default = 4;
  string          draw_model           = 5;
  repeated string draw_size            = 6;
  string          draw_size_default    = 7;
  int32           draw_n               = 8;
}

message PluginItem {
  string uuid        = 1; // 插件id
  string agent       = 2; // 智能体did
  string type        = 3; // 插件类型，Python插件-Python
  string sub_type    = 4; // 插件子类型, Python插件-Python
  string name        = 5; // 插件名字
  string url         = 6; // 插件url
  string description = 7; // 插件描述
  int64  created_at  = 8; // 创建时间
}

message PluginSwitchReq {
  string agent             = 1;
  bool   use_mem           = 2;
  bool   use_plugin_search = 3;
  bool   use_plugin_python = 4;
  bool   use_plugin_draw   = 5;
}

message PluginSwitchResp {
  bool use_mem           = 1;
  bool use_plugin_search = 2;
  bool use_plugin_python = 3;
  bool use_plugin_draw   = 4;
}

message SearchCreateReq {
  string agent       = 1;
  string type        = 2;
  string url         = 3;
  string description = 4;
}

message PythonCreateReq {
  string agent       = 1; // 智能体did
  string type        = 2; // 设置为Python
  string url         = 3; // 脚本zip压缩包url
  string name        = 4; // 脚本zip压缩包名称
  string description = 5; // 脚本描述
}

message PythonCreateResp {
  string uuid = 1; // 插件id
}

message DrawCreateReq {
  string agent        = 1;
  string draw_style   = 2;
  string draw_quality = 3;
  string draw_size    = 4;
}

message DrawCreateResp {
  string draw_style   = 1;
  string draw_quality = 2;
  string draw_size    = 3;
}

message ListPluginReq {
  string        agent      = 1;
  string        type       = 2;
  hi.Pagination pagination = 3;
}

message ListPluginResp {
  int32               total = 1;
  repeated PluginItem list  = 2;
}

message DeletePluginReq {
  string uuid = 1;
}

message DeletePluginByDidsReq {
  repeated string agents = 1;
}

// 修改插件的参数设置：
// 1. 插件uuid [必填]
// 以下是可以修改的字段
// 2. 插件名字，item.name
// 3. 插件url, item.url
// 4. 插件描述, item.description
message EditPluginReq {
  string     uuid = 1;
  PluginItem item = 2;
}

message GetDrawReq {
  string agent = 1;
}

message GetDrawResp {
  string draw_style   = 1;
  string draw_quality = 2;
  string draw_model   = 3;
  string draw_size    = 4;
  int32  draw_n       = 5;
}

message PythonParamsSetReq {
  string                 uuid   = 1; // 插件id
  google.protobuf.Struct params = 2; // 插件参数
}

message GetPythonParamsReq {
  string uuid = 1;
}

message GetPythonParamsResp {
  google.protobuf.Struct params = 1;
}

// apiKey鉴权
service Plugin {
  rpc DrawConfig (google.protobuf.Empty) returns (DrawConfigResp);
  rpc PluginSwitch (PluginSwitchReq) returns (PluginSwitchResp);
  rpc SearchCreate (SearchCreateReq) returns (google.protobuf.Empty);
  rpc PythonCreate (PythonCreateReq) returns (PythonCreateResp); // 创建Python插件
  rpc DrawCreate (DrawCreateReq) returns (DrawCreateResp);
  rpc List (ListPluginReq) returns (ListPluginResp);
  rpc Delete (DeletePluginReq) returns (google.protobuf.Empty);
  rpc DeleteByDids (DeletePluginByDidsReq) returns (google.protobuf.Empty);
  rpc Edit (EditPluginReq) returns (google.protobuf.Empty); // 编辑插件
  rpc GetDraw (GetDrawReq) returns (GetDrawResp);
  rpc PythonParamsSet (PythonParamsSetReq) returns (google.protobuf.Empty); // 设置Python插件参数
  rpc GetPythonParams (GetPythonParamsReq) returns (GetPythonParamsResp);
}

// 插件执行接口
message SearchReq {
  string type    = 1;
  string url     = 2;
  string uuid    = 3;
  string keyword = 4;
}

message SearchResp {
  repeated Content conts = 1;
}

message PythonReq {
  string code        = 1;
  string code_params = 2;
  string uuid        = 3;
}

message PythonResp {
  repeated Content conts = 1;
}

message PythonProjectReq {
  string          code_archive_url = 1;
  string          code_params      = 2;
  string          uuid             = 3;
  repeated string envs             = 4; // 环境变量key=value数组
}

message CleanupPythonProjectReq {
  string code_archive_url = 1;
}

service AiPlugin {
  rpc Search (SearchReq) returns (SearchResp);
  rpc Python (PythonReq) returns (PythonResp);
  rpc PythonProject (PythonProjectReq) returns (PythonResp);
  rpc CleanupPythonProject (CleanupPythonProjectReq) returns (google.protobuf.Empty);
}
