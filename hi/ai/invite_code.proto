syntax = "proto3";

package hi.ai;

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/ai";

import "google/protobuf/empty.proto";
import "hi/common.proto";

message InviteCodeCreateResp {
  string code      = 1;
  bool   is_active = 2;
}

message InviteCodeEditReq {
  string code = 1;
  string note = 2;
}

message InviteCodeListResp {
  message Unit {
    string code       = 1;
    bool   is_active  = 2;
    string note       = 3;
    int64  created_at = 4;
  }
  int32         total = 1;
  repeated Unit infos = 2;
}

message InviteCodeDeleteReq {
  string code = 1;
}

message InviteCodeVerifyReq {
  string id   = 1;
  string code = 2;
  string did  = 3;
}

// 邀请码
service InviteCode {
  rpc Create (google.protobuf.Empty) returns (InviteCodeCreateResp); // Token鉴权
  rpc Edit (InviteCodeEditReq) returns (google.protobuf.Empty); // Token鉴权
  rpc List (hi.Pagination) returns (InviteCodeListResp); // Token鉴权
  rpc Delete (InviteCodeDeleteReq) returns (google.protobuf.Empty); // Token鉴权
  rpc Verify (InviteCodeVerifyReq) returns (hi.AuthToken); // 不鉴权
}
