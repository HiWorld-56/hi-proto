syntax = "proto3";

package hi.club;

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/club";

import "google/protobuf/empty.proto";
import "hi/common.proto";

// GetNotPulledPcOrders接口请求参数Data部分的数据结构
message PcOrderData {
  string did   = 1;
  string nonce = 2;
}

message PcOrder {
  string id         = 1;
  string order_id   = 2;
  string to_did     = 3;
  string amount     = 4;
  string type       = 5;
  string created_at = 6;
  string updated_at = 7;
  string deleted_at = 8;
  string did        = 9;
  string status     = 10;
}

message GetNotPulledPcOrdersResp {
  repeated PcOrder orders = 1;
}

message UpdatePulledPcOrder {
  string order_id  = 1;
  string status    = 2;
  string tx_hash   = 3;
  int64  timestamp = 4;
}

// UpdatePulledPcOrders接口请求参数Data部分数据结构
message UpdatePulledPcOrderData {
  string                       did    = 1;
  repeated UpdatePulledPcOrder orders = 2;
}

service Order {
  rpc GetNotPulledPcOrders (hi.SignedData) returns (GetNotPulledPcOrdersResp);
  rpc UpdatePulledPcOrders (hi.SignedData) returns (google.protobuf.Empty);
}
