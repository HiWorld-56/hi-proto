syntax = "proto3";

package hi.club;

import "google/protobuf/empty.proto";
import "hi/ai/chat.proto";
import "hi/club/messaging.proto";

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/club";

message SimpleReq {
  repeated Content conts = 1;
}

message DialogReq {
  string did = 1;
  string cid = 2;
  repeated Content conts = 3;
  string state = 4;
  string custom = 5;
  bool return_plugin_use = 6;
  bool return_training_data = 7;
  bool return_context = 8;
}

message QA {
  repeated Content q = 1; // User
  string a = 2; // assistant
}

message GetContextResp {
  repeated QA list = 1;
}

message SpeechToSpeechReq {
  string did = 1;
  string cid = 2;
  repeated Content conts = 3;
  repeated hi.ai.ToolSupply tools = 4;
  optional string tool_choice = 5;
  optional string custom = 6;
  optional string state = 7;
  optional string style = 8;
}

message TextToTextReq {
  string did = 1;
  string cid = 2;
  repeated Content conts = 3;
  repeated hi.ai.ToolSupply tools = 4;
  optional string tool_choice = 5;
  optional string custom = 6;
  optional string state = 7;
}

message ToolCallResult {
  string id = 1;
  repeated Content conts = 2;
}

message ToolCallResultsReq {
  string id = 1;
  repeated ToolCallResult list = 2;
}

message SpeechToTextReq {
  string did = 1;
  string cid = 2;
  repeated Content conts = 3;
  repeated hi.ai.ToolSupply tools = 4;
  optional string tool_choice = 5;
  optional string custom = 6;
  optional string state = 7;
}

// Token鉴权
service Chat {
  rpc Simple(SimpleReq) returns (hi.ai.DialogResp);
  rpc GenerateCid(google.protobuf.Empty) returns (hi.ai.GenerateCidResp);
  rpc Dialog(DialogReq) returns (hi.ai.DialogResp);
  rpc DialogStream(DialogReq) returns (stream hi.ai.DialogStreamResp);
  rpc ClearContext(hi.ai.ClearContextReq) returns (google.protobuf.Empty);
  rpc GetContext(hi.ai.GetContextReq) returns (GetContextResp);

  rpc SimpleTextToSpeech(hi.ai.SimpleTextToSpeechReq) returns (hi.ai.SimpleTextToSpeechResp);
  rpc SimpleSpeechToText(hi.ai.SimpleSpeechToTextReq) returns (hi.ai.SimpleSpeechToTextResp);

  rpc SpeechToSpeech(SpeechToSpeechReq) returns (hi.ai.ChatResp);
  rpc SpeechToSpeech2(ToolCallResultsReq) returns (hi.ai.ChatResp);
  rpc TextToText(TextToTextReq) returns (hi.ai.ChatResp);
  rpc TextToText2(ToolCallResultsReq) returns (hi.ai.ChatResp);
  rpc SpeechToText(SpeechToTextReq) returns (hi.ai.ChatResp);
  rpc SpeechToText2(ToolCallResultsReq) returns (hi.ai.ChatResp);
}
