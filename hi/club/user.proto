syntax = "proto3";

package hi.club;

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/club";

import "google/protobuf/empty.proto";
import "hi/common.proto";
import "hi/club/messaging.proto";

message UserInfo {
  hi.Entity       base          = 1;
  repeated string permissions   = 2;
  string          verify_policy = 3; // 添加好友校验方式
}

message ListSystemMessageReq {
  string        status     = 1;
  hi.Pagination pagination = 2;
}

message SystemMessages {
  bool             has_new = 1;
  int32            total   = 2;
  repeated Notice  list    = 3;
}

message DeleteSystemMessageReq {
  string uuid = 1;
}

message HandleSystemMessageReq {
  string uuid   = 1;
  string status = 2;
}

message ListFriendsResp {
  repeated hi.Entity list = 1;
}

message AddFriendReq {
  string did  = 1;
  string type = 2;
}

enum FriendRequestStatus {
  FRIEND_REQUEST_STATUS_UNSPECIFIED = 0; // 未设置
  FRIEND_REQUEST_STATUS_REJECTED    = 1; // 好友申请拒绝
  FRIEND_REQUEST_STATUS_SENT        = 2; // 好友申请已发送
  FRIEND_REQUEST_STATUS_ADDED       = 3; // 好友添加成功
}

message AddFriendResp {
  FriendRequestStatus status = 1;
}

message DeleteFriendReq {
  string did = 1;
}

message ListGroupReqResp {
  repeated string list = 1;
}

message GetUserReq {
  string did = 1;
}

message UnprocessedSysMsgCountResp {
  int32 count = 1;
}

message UpdateUserReq {
  hi.Entity user = 1;
  // auto_reject-自动拒绝
  // manual_accept-手动同意
  // auto_accept-自动同意
  string verify_policy = 2; // 添加好友校验方式
}

service User {
  rpc GetCurrentUser (google.protobuf.Empty) returns (UserInfo); // 当前用户信息
  rpc UpdateUser (UpdateUserReq) returns (google.protobuf.Empty); // 用户信息
  rpc ListSystemMessage (ListSystemMessageReq) returns (SystemMessages); // 系统消息列表
  rpc DeleteSystemMessage (DeleteSystemMessageReq) returns (google.protobuf.Empty); // 删除系统消息
  rpc DeleteAllSystemMessage (google.protobuf.Empty) returns (google.protobuf.Empty); // 删除所有系统消息
  rpc HandleSystemMessage (HandleSystemMessageReq) returns (google.protobuf.Empty); // 处理系统消息
  rpc ListFriends (google.protobuf.Empty) returns (ListFriendsResp); // 当前用户好友
  rpc AddFriend (AddFriendReq) returns (AddFriendResp); // 添加好友
  rpc DeleteFriend (DeleteFriendReq) returns (google.protobuf.Empty); // 删除好友
  rpc ListGroups (google.protobuf.Empty) returns (ListGroupReqResp); // 智能体所在群的群Code
  rpc GetOther (GetUserReq) returns (hi.Entity); // 根据DID获取用户基本信息
  rpc UnprocessedSysMsgCount (google.protobuf.Empty) returns (UnprocessedSysMsgCountResp);
}
