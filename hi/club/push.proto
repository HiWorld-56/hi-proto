syntax = "proto3";

package hi.club;

option go_package = "github.com/HiWorld-56/hi-proto/gen/go/hi/club";

import "google/protobuf/empty.proto";
import "hi/common.proto";

message PushRegisterReq {
  hi.ClientInfo node  = 1;
  string        token = 2; // 设备Token
}

message PushUnregisterReq {
  string token = 1; // 设备Token
}

// Token鉴权
service PushManager {
  rpc Register (PushRegisterReq) returns (google.protobuf.Empty);
  rpc Unregister (PushUnregisterReq) returns (google.protobuf.Empty);
}
